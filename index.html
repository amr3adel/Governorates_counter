<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Egypt Governorates Counter</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-theme="dark">
    <main class="app-shell">
      <section class="summary-panel" aria-labelledby="app-title">
        <div class="hero-copy">
          <p class="eyebrow">Arab Republic of Egypt</p>
          <h1 id="app-title">Governorates Counter</h1>
          <p class="intro" id="introText">Track, search, and count Egypt's governorates in one focused view.</p>

          <div class="personal-row">
            <label class="name-field">
              <span>Your name</span>
              <input id="nameInput" type="text" placeholder="Enter your name" autocomplete="name">
            </label>

            <button class="theme-toggle" type="button" id="themeToggle" aria-pressed="true">
              <span class="toggle-track" aria-hidden="true"><span></span></span>
              <span id="themeLabel">Dark</span>
            </button>
          </div>
        </div>

        <div class="counter-card" aria-live="polite">
          <span class="counter-number" id="selectedCount">0</span>
          <span class="counter-label">selected of <strong id="totalCount">27</strong></span>
          <span class="counter-percent" id="percentageCount">0%</span>
        </div>

        <div class="progress" aria-hidden="true">
          <span id="progressBar"></span>
        </div>
      </section>

      <section class="dashboard-grid" aria-label="Governorates dashboard">
        <div class="tool-panel" aria-label="Governorate controls">
          <div class="toolbar">
            <label class="search-field">
              <span>Search governorates</span>
              <input id="searchInput" type="search" placeholder="Search by name or region">
            </label>

            <div class="actions" aria-label="Selection actions">
              <button type="button" id="selectAllButton">Select all</button>
              <button type="button" id="clearButton">Clear</button>
            </div>
          </div>

          <div class="chips" id="regionFilters" aria-label="Filter by region"></div>

          <div class="list-status" id="listStatus"></div>
          <div class="governorate-grid" id="governorateGrid"></div>
        </div>

        <aside class="map-panel" aria-label="Egypt travel map">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Visited map</p>
              <h2>Egypt progress</h2>
            </div>
            <span class="remaining-pill" id="remainingPill">27 left</span>
          </div>

          <div class="map-wrap" id="mapWrap"></div>

          <div class="route-card">
            <div class="panel-heading compact">
              <div>
                <p class="eyebrow">Route idea</p>
                <h2>Still missing</h2>
              </div>
            </div>
            <ol class="route-list" id="routeList"></ol>
          </div>
        </aside>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
